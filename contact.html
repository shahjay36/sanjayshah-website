</head>
<body>
  <nav>
    <div class="nav-inner">
        <a href="index.html" class="nav-logo">સંજય શાહ</a>

            <li><a href="contact.html">સંપર્ક</a></li>
            <li>
                <button id="theme-toggle" aria-label="Toggle Mode">
                    <svg id="theme-icon" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
                    </svg>
                </button>

</nav>

  <section style="padding: 10rem 0; text-align: center;">
    <div style="max-width: 600px; margin: 0 auto; padding: 4rem; border: 1px solid rgba(196,164,132,0.2);">
      <h2 style="color:var(--gold); font-style:italic; font-size:1.8rem;">સંવાદ 💌</h2>
      <h1 style="font-size: 3rem; margin: 2rem 0;">જોડાઓ મારી સાથે</h1>
      <p style="font-size: 1.2rem; opacity:0.7; margin-bottom: 3rem;">તમારા પ્રતિભાવો અને વિચારો મારા માટે અમૂલ્ય છે.</p>
      <a href="mailto:sanjay36@gmail.com" class="btn-turn" style="padding: 1.2rem 3rem;">ઈમેલ મોકલો</a>
    </div>
  </section>
  <script>
    const themeBtn = document.getElementById('theme-toggle');
    const themeIcon = document.getElementById('theme-icon');
    
    function updateIcon(theme) {
        if(theme === 'dark') {
            themeIcon.innerHTML = '<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>';
        } else {
            themeIcon.innerHTML = '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>';
        }
    }

    themeBtn.addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme');
        const target = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', target);
        localStorage.setItem('theme', target);
        updateIcon(target);
    });

    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    updateIcon(savedTheme);
</script>
  <script>
    const themeBtn = document.getElementById('theme-toggle');
    const themeIcon = document.getElementById('theme-icon');
    const html = document.documentElement;

    function updateIcon(theme) {
        if(theme === 'dark') {
            themeIcon.innerHTML = '<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>';
        } else {
            themeIcon.innerHTML = '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>';
        }
    }

    themeBtn.addEventListener('click', () => {
        const current = html.getAttribute('data-theme');
        const target = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', target);
        localStorage.setItem('theme', target);
        updateIcon(target);
    });

    const savedTheme = localStorage.getItem('theme') || 'light';
    html.setAttribute('data-theme', savedTheme);
    updateIcon(savedTheme);
</script>
</body>
</html>
