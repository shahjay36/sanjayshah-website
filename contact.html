<!DOCTYPE html>

  <script>(function(){var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>
  <nav>

      <button id="theme-toggle" aria-label="Toggle dark mode">

          <svg class="icon-sun" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
    </div>
  </nav>

  <section style="padding: 10rem 0; text-align: center; background: var(--purple-25); border-bottom: 1px solid var(--purple-100);">

      <span class="section-label">સંવાદ 💌</span>
      <h1 style="font-size: 3.5rem; margin-bottom: 1.5rem; font-weight: 700; color: var(--purple-900);">જોડાઓ મારી સાથે</h1>
      <p style="font-size: 1.25rem; color: var(--gray-500); max-width: 550px; margin: 0 auto 3rem; line-height: 1.8;">

      </p>
      
      <a href="mailto:sanjay36@gmail.com" class="btn btn-primary" style="font-size: 1.25rem; padding: 1.25rem 3rem; box-shadow: 0 4px 14px 0 rgba(108, 95, 199, 0.39);">
        ઈમેલ મોકલો
      </a>
    </div>
  </section>

  <footer style="padding: 4rem 0; text-align: center;">
    <p style="color: var(--gray-500); font-size: 0.95rem;">&copy; 2026 સંજય શાહ · Human-directed. AI-assisted.</p>
  </footer>

  <script>
    document.getElementById('theme-toggle').addEventListener('click', function() {
      var c = document.documentElement.getAttribute('data-theme');
      var n = c === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', n);
      localStorage.setItem('theme', n);
    });
  </script>
