<!DOCTYPE html>
<html lang="gu">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>સંજય શાહ | હોમ</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Noto+Serif+Gujarati:wght@400;700&display=swap" rel="stylesheet" />
  <script>(function(){var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>
  <nav><div class="nav-inner">
    <a href="index.html" class="nav-logo"><span class="logo-mark">SS</span>સંજય શાહ</a>
    <ul class="nav-links">
      <li><a href="index.html" class="active">હોમ</a></li>
      <li><a href="about.html">મારી કહાની</a></li>
      <li><a href="poems.html">કવિતાઓ</a></li>
      <li><a href="contact.html">સંપર્ક</a></li>
    </ul>
    <button id="theme-toggle" aria-label="Toggle dark mode">
        <svg class="icon-moon" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        <svg class="icon-sun" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
  </div></nav>

  <section style="background: var(--purple-25); padding: 8rem 0; border-bottom: 1px solid var(--purple-100);">
    <div class="container">
      <span class="section-label">લેખક · કવિ · વિચારક</span>
      <h1 style="font-size: 3.5rem; margin-bottom: 1.5rem;">શબ્દોના સથવારે <br><span style="color: var(--purple-600);">જીવનનો ઉત્સવ.</span></h1>
      <p style="font-size: 1.25rem; color: var(--gray-500); max-width: 600px; margin-bottom: 2.5rem;">હું સંજય શાહ, અને હું ગુજરાતી શબ્દોની લયમાં જીવનનું સૌંદર્ય શોધું છું. મારો મંત્ર છે: જીવનને મન ભરીને જીવો.</p>
      <a href="poems.html" class="btn btn-primary">કવિતાઓ વાંચો</a>
    </div>
  </section>

  <script>
    document.getElementById('theme-toggle').addEventListener('click', function() {
      var c = document.documentElement.getAttribute('data-theme');
      var n = c === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', n);
      localStorage.setItem('theme', n);
    });
  </script>
</body>
</html>
