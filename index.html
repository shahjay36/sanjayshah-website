<!DOCTYPE html>
<html lang="gu">
<head>
  <meta charset="UTF-8" /><link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Gujarati:wght@400;700&display=swap" rel="stylesheet" />
</head>
<body>
  <nav>
    <div class="nav-inner">
        <a href="index.html" class="nav-logo">સંજય શાહ</a>
        <ul class="nav-links">
            <li><a href="index.html">હોમ</a></li>
            <li><a href="about.html">મારી કહાની</a></li>
            <li><a href="poems.html">કવિતાઓ</a></li>
            <li><a href="contact.html">સંપર્ક</a></li>
        </ul>
        <button id="theme-toggle">
            <svg id="theme-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
            </svg>
        </button>
    </div>
</nav>

  <section style="flex-grow:1; display:flex; align-items:center; justify-content:center;">
    <div style="text-align:center; padding: 4rem; border: 1px solid var(--gold); background: var(--page-bg); box-shadow: 10px 10px 30px rgba(0,0,0,0.05);">
       <span style="color:var(--gold); font-size:1.2rem; letter-spacing:3px;">લેખક · કવિ · વિચારક</span>
       <h1 style="font-size:3.5rem; margin:1.5rem 0;">શબ્દોના સથવારે</h1>
       <p style="font-size:1.3rem; font-style:italic; opacity:0.7;">"જ્યારે શબ્દો હૃદયનો રસ્તો શોધે છે, ત્યારે કવિતા જન્મે છે."</p>
       <a href="poems.html" class="btn-nav" style="text-decoration:none; display:inline-block; margin-top:2rem;">પુસ્તક ખોલો</a>
    </div>
  </section>
  <script>
    const themeBtn = document.getElementById('theme-toggle');
    const themeIcon = document.getElementById('theme-icon');
    
    function updateIcon(theme) {
        if(theme === 'dark') {
            themeIcon.innerHTML = '<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>';
        } else {
            themeIcon.innerHTML = '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>';
        }
    }

    themeBtn.addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme');
        const target = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', target);
        localStorage.setItem('theme', target);
        updateIcon(target);
    });

    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    updateIcon(savedTheme);
</script>
</body>
</html>
