<!DOCTYPE html>
<html lang="gu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>મારી કહાની · સંજય શાહ</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Serif+Gujarati:wght@400;700&display=swap" rel="stylesheet" />
  <script>(function(){var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();</script>
  <style>
    body, h1, h2, h3, p, a, blockquote { font-family: 'Noto Serif Gujarati', 'Inter', serif !important; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="index.html" class="nav-logo"><span style="background: var(--purple-600); color: white; padding: 2px 8px; border-radius: 4px; margin-right: 8px; font-weight: bold;">SS</span>સંજય શાહ</a>
      <ul class="nav-links">
        <li><a href="index.html">હોમ</a></li>
        <li><a href="about.html" class="active">મારી કહાની</a></li>
        <li><a href="contact.html">સંપર્ક</a></li>
      </ul>
      <button id="theme-toggle">🌓</button>
    </div>
  </nav>

  <section style="background: var(--purple-25); border-bottom: 1px solid var(--purple-100); padding: 5rem 0 4rem;">
    <div class="container">
        <p class="section-label">મારી સફર</p>
        <h1 style="margin-bottom: 1.5rem;">શબ્દો અને સંસ્કારોનો <span style="color: var(--purple-600);">વારસો.</span></h1>
        <p style="font-size: 1.125rem; color: var(--gray-500); max-width: 800px; line-height: 1.75;">
            આજની ભાગદોડ ભરી જિંદગીમાં માણસ પોતાની જાત માટે સમય કાઢવાનું ભૂલી ગયો છે...
        </p>
    </div>
</section>

<section style="padding: 4rem 0;">
    <div class="container">
        <div class="card">
            <blockquote style="font-size: 1.5rem; line-height: 2; color: var(--purple-600); border-left: 5px solid var(--purple-600); padding-left: 30px;">
                "એક બીજાને ગમતા રહીએ, કંઈ ખટકે તો ખમતા રહીએ..."
            </blockquote>
        </div>
    </div>
</section>
  <script>
    document.getElementById('theme-toggle').addEventListener('click', function() {
      var c = document.documentElement.getAttribute('data-theme');
      var n = c === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', n);
      localStorage.setItem('theme', n);
    });
  </script>
</body>
</html>
